{% extends "base.html" %}

{% block content %}

<style>

/* 🌌 Background */
.perf-bg {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    z-index: -1;
    overflow: hidden;
}

/* ⚫⚪ blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
}

.blob1 { width:300px; height:300px; background:#fff; top:-50px; left:-50px; }
.blob2 { width:250px; height:250px; background:#777; bottom:50px; left:100px; }
.blob3 { width:300px; height:300px; background:#fff; right:50px; top:100px; }
.blob4 { width:200px; height:200px; background:#555; right:200px; bottom:50px; }

/* 💎 Glass Card */
.glass-card {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    color: #f1f5f9;
}

/* ✨ Inputs (แก้พิมพ์ดำ) */
.form-control {
    background: rgba(0,0,0,0.6) !important;
    border: 1px solid #444;
    color: #fff !important;
}

.form-control:focus {
    background: rgba(0,0,0,0.8) !important;
    color: #fff !important;
    border-color: #888;
    box-shadow: none !important;
}

.form-control::placeholder {
    color: #aaa;
}

/* select */
select.form-control {
    color: #fff !important;
    background-color: rgba(0,0,0,0.6) !important;
}

/* 🔘 Button */
.btn-save {
    background: #fff;
    color: #000;
    border: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-save:hover {
    background: #ddd;
}

/* 🧊 Layout */
.perf-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

</style>

<!-- 🌌 Background -->
<div class="perf-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
</div>

<!-- 💎 Form -->
<div class="perf-wrapper">

    <div style="max-width:500px; width:100%;">
        <div class="glass-card">

            <h3 class="mb-4 text-center">
                <i class="bi bi-gear"></i> Add Performance
            </h3>

            <form method="POST">

                <div class="mb-3">
                    <label>Graphics</label>
                    <select name="graphics" class="form-control">
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                        <option>Ultra</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>FPS</label>
                    <input type="number" name="fps" class="form-control" placeholder="Enter FPS" required>
                </div>

                <div class="mb-3">
                    <label>Resolution</label>
                    <select name="resolution" class="form-control">
                        <option>720p</option>
                        <option>1080p</option>
                        <option>1440p</option>
                        <option>4K</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-save w-100">
                    Save Performance
                </button>

            </form>

        </div>
    </div>

</div>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>

/* 🌌 Background */
/* 🌑 Minimal Dark Theme */
body {
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: 'Segoe UI', sans-serif;
}

/* Navbar */
.navbar {
    background: #111 !important;
    border-bottom: 1px solid #222;
}

/* Title */
h1 {
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* 🔍 Search bar */
input.form-control {
    background: #111;
    border: 1px solid #333;
    color: #fff;
}

input.form-control::placeholder {
    color: #777;
}

/* 💎 Card */
.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #444;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

/* 🖼️ Image */
.game-img {
    border-radius: 10px;
}

/* 🔘 Buttons (minimal) */
.btn {
    border-radius: 8px;
    border: 1px solid #333;
    background: transparent;
    color: #ddd;
}

.btn:hover {
    background: #222;
}

/* ปุ่ม action */
.btn-info,
.btn-warning,
.btn-danger,
.btn-primary {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #ccc;
}

.btn-info:hover,
.btn-warning:hover,
.btn-danger:hover,
.btn-primary:hover {
    background: #2a2a2a;
}

/* 🔥 Add Game button */
.btn-add {
    background: #fff;
    color: #000;
    border: none;
}

.btn-add:hover {
    background: #ddd;
}

/* 👤 Profile */
.profile-circle {
    background: #222;
    color: #fff;
}

.profile-circle:hover {
    background: #333;
}

/* dropdown */
.dropdown-dark {
    background: #111;
    border: 1px solid #222;
}

.dropdown-dark .dropdown-item:hover {
    background: #222;
}
/* 🖼️ Image */
.game-img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover .game-img {
    transform: scale(1.05);
}

/* 🔘 Buttons */
.btn {
    transition: 0.25s;
}

.btn:hover {
    transform: translateY(-2px);
}

.btn-info {
    background: #0ea5e9;
    border: none;
}

.btn-warning {
    background: #facc15;
    border: none;
    color: black;
}

.btn-danger {
    background: #ef4444;
    border: none;
}

.btn-primary {
    background: #3b82f6;
    border: none;
}

/* dropdown ทั้งกล่อง */
.dropdown-menu {
    background: rgba(0,0,0,0.7) !important;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
}

/* text */
.dropdown-menu .dropdown-item {
    color: #e5e7eb !important;
}

/* hover */
.dropdown-menu .dropdown-item:hover {
    background: rgba(255,255,255,0.1);
    color: #fff !important;
}

/* username box */
.dropdown-menu li {
    color: #f1f5f9;
}

/* logout สีแดงให้เข้าธีม */
.dropdown-menu .text-danger {
    color: #ef4444 !important;
}
.dropdown-menu {
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.profile-circle:hover {
    background: #2563eb;
    transform: scale(1.1);
}

/* dropdown dark */
.dropdown-dark {
    background: #1e293b;
    border: none;
}

.dropdown-dark .dropdown-item {
    color: white;
}

.dropdown-dark .dropdown-item:hover {
    background: #334155;
}

/* 🔥 Title */
h1, h2, h3 {
    font-weight: bold;
}

/* 📦 Container */
.container {
    max-width: 1200px;
}

</style>
</head>

<body>

<!-- 🎮 Navbar -->
<nav class="navbar navbar-dark">
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <!-- Logo -->
        <span class="navbar-brand fw-bold"> Game Tracker</span>

        <!-- Menu -->
        <div class="d-flex align-items-center gap-3">

            <a href="/" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house"></i> Home
            </a>

            <a href="/add-game" class="btn btn-outline-light btn-sm">
                <i class="bi bi-plus-circle"></i> Add Game
            </a>

            {% if current_user.is_authenticated %}

            <!-- Profile -->
            <div class="dropdown">
                <div class="profile-circle dropdown-toggle" data-bs-toggle="dropdown">
                    {{ current_user.username[0] | upper }}
                </div>

                <ul class="dropdown-menu dropdown-menu-end dropdown-dark">

                    <li class="px-3 py-2 text-white">
                        <strong>{{ current_user.username }}</strong><br>
                        <small>ID: {{ current_user.id }}</small>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item text-danger" href="/logout">
                            🚪 Logout
                        </a>
                    </li>

                </ul>
            </div>

            {% else %}

                <a href="/login" class="btn btn-warning btn-sm">Login</a>
                <a href="/register" class="btn btn-success btn-sm">Register</a>

            {% endif %}

        </div>
    </div>
</nav>

<!-- 💎 Content -->
<div class="main-container">
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>

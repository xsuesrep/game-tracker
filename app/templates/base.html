<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

   <style>
/* 🌌 Background */
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* 🎮 Navbar */
.navbar {
    background: rgba(39, 39, 39, 0.8) !important;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* 💎 Card */
.card {
    border-radius: 15px;
    transition: 0.3s;
    background: #b1b1b1; 
    border: none; 
    overflow: hidden;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6),
                0 0 15px rgba(0, 0, 0, 0.4);
}

/* 🖼️ Image */
.game-img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 10px;
}

/* hover zoom */
.card:hover .game-img {
    transform: scale(1.05);
}

/* 🔘 Buttons */
.btn-sm {
    border-radius: 8px;
}

.btn-info {
    background: #0ea5e9;
    border: none;
}

.btn-warning {
    background: #c6d445;
    border: none;
    color: rgb(19, 18, 18);
}

.btn-danger {
    background: #ef4444;
    border: none;
}

.btn-primary {
    background: #5f5e5f;
    border: none;
}

/* 🔥 Title */
h1 {
    font-weight: bold;
    letter-spacing: 1px;
}

/* 📦 Container */
.container {
    max-width: 1200px;
}
.profile-circle {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #3b82f6;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.profile-circle:hover {
    background: #2563eb;
    transform: scale(1.1);
}

/* dropdown dark */
.dropdown-dark {
    background: #1e293b;
    border: none;
}

.dropdown-dark .dropdown-item {
    color: white;
}

.dropdown-dark .dropdown-item:hover {
    background: #334155;
}
</style>
 
    <style>
    body {
         background: #0a0a0a;
         color: white;
         font-family: 'Segoe UI', sans-serif;}

</style>

</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <!-- 🎮 Logo -->
        <span class="navbar-brand fw-bold">Game Tracker</span>

        <!-- 👉 Right Menu -->
        <div class="d-flex align-items-center gap-3">

            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
            <a href="/add-game" class="btn btn-outline-light btn-sm">Add Game</a>

            {% if current_user.is_authenticated %}

            <!-- 👤 Profile Circle -->
            <div class="dropdown">
                <div class="profile-circle dropdown-toggle" data-bs-toggle="dropdown">
                    {{ current_user.username[0] | upper }}
                </div>

                <!-- 📦 Dropdown -->
                <ul class="dropdown-menu dropdown-menu-end dropdown-dark">

                    <li class="px-3 py-2 text-white">
                        <strong>{{ current_user.username }}</strong><br>
                        <small>User ID: {{ current_user.id }}</small>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item text-danger" href="/logout">
                            🚪 Logout
                        </a>
                    </li>

                </ul>
            </div>

            {% else %}
                <a href="/login" class="btn btn-warning btn-sm">Login</a>
                <a href="/register" class="btn btn-success btn-sm">Register</a>
            {% endif %}

        </div>

    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>

{% extends "base.html" %}

{% block content %}

<style>

/* 🌌 Background */
.edit-bg {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    z-index: -1;
    overflow: hidden;
}

/* ⚫⚪ blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #ffffff;
    top: -50px;
    left: -50px;
}

.blob2 {
    width: 250px;
    height: 250px;
    background: #777;
    bottom: 50px;
    left: 100px;
}

.blob3 {
    width: 300px;
    height: 300px;
    background: #fff;
    right: 50px;
    top: 100px;
}

.blob4 {
    width: 200px;
    height: 200px;
    background: #555;
    right: 200px;
    bottom: 50px;
}

/* 💎 Glass Card */
.glass-card {
    width: 450px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    color: white;
}

/* ✨ Inputs */
.form-control {
    background: rgba(255,255,255,0.05);
    border: 1px solid #333;
    color: white;
}

.form-control:focus {
    background: rgba(255,255,255,0.08);
    border-color: #666;
    box-shadow: none;
}

.form-control::placeholder {
    color: #888;
}

/* 🔘 Button */
.btn-update {
    background: #fff;
    color: #000;
    border: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-update:hover {
    background: #ddd;
}

/* 🧊 Layout */
.edit-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

</style>

<!-- 🌌 Background -->
<div class="edit-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
</div>

<!-- 💎 Form -->
<div class="edit-wrapper">

    <div class="glass-card">

        <h3 class="text-center mb-4">
            <i class="bi bi-pencil-square"></i> Edit Game
        </h3>

        <form method="POST">

            <!-- 🎮 Game Name -->
            <label>Game Name</label>
            <input type="text" name="name" value="{{ game.name }}" class="form-control mb-3" required>

            <!-- 🎯 Genre -->
            <label>Genre</label>
            <select name="genre" class="form-control mb-3">
                <option {% if game.genre == "Action" %}selected{% endif %}>Action</option>
                <option {% if game.genre == "RPG" %}selected{% endif %}>RPG</option>
                <option {% if game.genre == "Open World" %}selected{% endif %}>Open World</option>
                <option {% if game.genre == "FPS" %}selected{% endif %}>FPS</option>
                <option {% if game.genre == "Strategy" %}selected{% endif %}>Strategy</option>
                <option {% if game.genre == "Adventure" %}selected{% endif %}>Adventure</option>
            </select>

            <!-- ⭐ Rating -->
            <label>Rating</label>
            <select name="rating" class="form-control mb-3">
                <option value="1" {% if game.rating == 1 %}selected{% endif %}>⭐</option>
                <option value="2" {% if game.rating == 2 %}selected{% endif %}>⭐⭐</option>
                <option value="3" {% if game.rating == 3 %}selected{% endif %}>⭐⭐⭐</option>
                <option value="4" {% if game.rating == 4 %}selected{% endif %}>⭐⭐⭐⭐</option>
                <option value="5" {% if game.rating == 5 %}selected{% endif %}>⭐⭐⭐⭐⭐</option>
            </select>

            <!-- 🎮 Platform -->
            <label>Platform</label>
            <select name="platform" class="form-control mb-3">
                <option {% if game.platform == "PC" %}selected{% endif %}>PC</option>
                <option {% if game.platform == "PlayStation" %}selected{% endif %}>PlayStation</option>
                <option {% if game.platform == "Xbox" %}selected{% endif %}>Xbox</option>
                <option {% if game.platform == "Mobile" %}selected{% endif %}>Mobile</option>
            </select>

            <!-- 📊 Status -->
            <label>Status</label>
            <select name="status" class="form-control mb-3">
                <option {% if game.status == "Playing" %}selected{% endif %}>Playing</option>
                <option {% if game.status == "Completed" %}selected{% endif %}>Completed</option>
                <option {% if game.status == "Plan to Play" %}selected{% endif %}>Plan to Play</option>
            </select>

            <!-- 📝 Note -->
            <label>Note</label>
            <textarea name="note" class="form-control mb-3">{{ game.note }}</textarea>

            <!-- 💾 Update -->
            <button class="btn btn-update w-100">
                <i class="bi bi-check2"></i> Update Game
            </button>

        </form>

    </div>

</div>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<style>

/* 🌌 Background */
.glass-bg {
    position: fixed;
    inset: 0;
    background: #8fa3ad;
    overflow: hidden;
}

/* 🔵 floating blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(50px);
    opacity: 0.8;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #2b50ff;
    top: -50px;
    left: -50px;
}

.blob2 {
    width: 200px;
    height: 200px;
    background: #1de9b6;
    bottom: 50px;
    left: 100px;
}

.blob3 {
    width: 250px;
    height: 250px;
    background: #2b50ff;
    right: 50px;
    top: 150px;
}

.blob4 {
    width: 150px;
    height: 150px;
    background: #1de9b6;
    right: 200px;
    bottom: 80px;
}

/* 💎 Glass Card */
.glass-card {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    z-index: 2;
}

/* ✨ input */
.form-control {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.5);
    color: white;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.7);
}

/* 🔘 button */
.btn-login {
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    border: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn-login:hover {
    transform: scale(1.05);
}

/* 🧊 center */
.login-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 📝 text left */
.glass-text {
    position: absolute;
    left: 100px;
    font-size: 50px;
    font-weight: bold;
    color: rgb(37, 37, 37);
}

/* 📱 responsive */
@media(max-width: 768px){
    .glass-text {
        display: none;
    }
}

/* container */
.top-register {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

/* ปุ่ม */
.top-register .btn {
    border-radius: 8px;
    font-weight: 500;
    padding: 6px 14px;
}

/* Login */
.top-register .btn-login-top {
    background: rgba(0,0,0,0.5);
    color: rgb(209, 204, 204);
    border: 1px solid #aaa;
}

/* Register (เด่นกว่า) */
.top-register .btn-register-top {
    background: #cf0b0b;
    color: #000;
    border: none;
}

/* hover */
.top-register .btn:hover {
    transform: translateY(-2px);
}
.top-register {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    gap: 10px;
}

/* ปุ่มพื้นฐาน */
.top-btn {
    padding: 6px 14px;
    border-radius: 8px;
    font-weight: 500;
    text-decoration: none;
    transition: 0.2s;
}

/* Register */
.register-btn {
    background: #161616b0;
    color: #fffdfd;
}

/* hover */
.top-btn:hover {
    transform: translateY(-2px);
}
.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #333; 
    font-size: 18px;
}

.toggle-password:hover {
    color: #000;
}

/* กัน icon ทับ text */
.form-control {
    padding-right: 40px;
}
</style>

<!-- 🌌 BG -->
<div class="glass-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
</div>

<!-- 📝 TEXT -->
<div class="glass-text">
    GAME TRACKER
</div>
<!-- 🔥 Register มุมขวาบน -->
<div class="top-register">
    <a href="/register" class="top-btn register-btn">Register</a>
</div>
<!-- 💎 LOGIN -->
<div class="login-wrapper">

    <div class="glass-card text-center">

        <div class="mb-3">
            <i class="bi bi-person-circle" style="font-size:50px;"></i>
        </div>
        
   

        <h3>Login</h3>
        <p style="font-size: 14px;">Welcome back please login</p>

        <form method="POST">

    <input class="form-control mb-3" name="username" placeholder="User Name">

    
    <div class="position-relative mb-3">

        <input type="password" id="password" name="password" class="form-control pe-5" placeholder="Password">

        <i class="bi bi-eye-slash toggle-password" data-target="password"></i>

    </div> 

    <!-- checkbox -->
    <div class="d-flex justify-content-between mb-3" style="font-size: 12px;">
        <div>
            <input type="checkbox"> Remember me
        </div>
        <a href="#">Forgot?</a>
    </div>

    <button class="btn btn-login w-100">
        Login
    </button>

</form>
    </div>

</div>
    <script>
document.querySelectorAll('.toggle-password').forEach(icon => {
    icon.addEventListener('click', function () {

        const input = document.getElementById(this.dataset.target);

        const type = input.type === 'password' ? 'text' : 'password';
        input.type = type;

        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');

    });
});
</script>
{% endblock %}

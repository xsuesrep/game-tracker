{% extends "base.html" %}

{% block content %}

<style>

/* 🌌 Background */
.add-bg {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    z-index: -1;
    overflow: hidden;
}

/* ⚫⚪ blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #ffffff;
    top: -50px;
    left: -50px;
}

.blob2 {
    width: 250px;
    height: 250px;
    background: #777;
    bottom: 50px;
    left: 100px;
}

.blob3 {
    width: 300px;
    height: 300px;
    background: #fff;
    right: 50px;
    top: 100px;
}

.blob4 {
    width: 200px;
    height: 200px;
    background: #555;
    right: 200px;
    bottom: 50px;
}

/* 💎 Glass Card */
.glass-card {
    width: 450px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255, 246, 246, 0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    color: white;
}

/* ✨ Inputs */
/* ปกติ */
.form-control {
    background: #38373799 !important;
    color: #fff !important;
    border: 1px solid #aaaaaa;
}

/* ตอนคลิก / พิม */
.form-control:focus {
    background: rgba(0, 0, 0, 0.8) !important;
    color: #fff !important;
    border-color: #888;
    box-shadow: none !important;
}

/* placeholder */
.form-control::placeholder {
    color: #aaa;
}

/* select dropdown */
select.form-control {
    color: #fff !important;
    background-color: #38373799 !important;
}
/* 🔘 Button */
.btn-save {
    background: #fff;
    color: #000;
    border: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-save:hover {
    background: #ddd;
}

/* 🧊 Layout */
.add-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

</style>

<!-- 🌌 Background -->
<div class="add-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
</div>

<!-- 💎 Form -->
<div class="add-wrapper">

    <div class="glass-card">

        <h3 class="text-center mb-4">
            <i class="bi bi-plus-circle"></i> Add Game
        </h3>

        <form method="POST">

            <!-- 🎮 Game Name -->
            <label>Game Name</label>
            <input type="text" name="name" class="form-control mb-3" required>

            <!-- 🎯 Genre -->
            <label>Genre</label>
            <select name="genre" class="form-control mb-3">
                <option>Action</option>
                <option>RPG</option>
                <option>Open World</option>
                <option>FPS</option>
                <option>Strategy</option>
                <option>Adventure</option>
            </select>

            <!-- ⭐ Rating -->
            <label>Rating</label>
            <select name="rating" class="form-control mb-3">
                <option value="1">⭐</option>
                <option value="2">⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="5">⭐⭐⭐⭐⭐</option>
            </select>

            <!-- 🎮 Platform -->
            <label>Platform</label>
            <select name="platform" class="form-control mb-3">
                <option>PC</option>
                <option>PlayStation</option>
                <option>Xbox</option>
                <option>Mobile</option>
            </select>

            <!-- 📊 Status -->
            <label>Status</label>
            <select name="status" class="form-control mb-3">
                <option>Playing</option>
                <option>Completed</option>
                <option>Plan to Play</option>
            </select>

            <!-- 🖼️ Image -->
            <label>Image URL</label>
            <input type="text" name="image_url" class="form-control mb-3" placeholder="https://image-link.com">

            <!-- 📝 Note -->
            <label>Note</label>
            <textarea name="note" class="form-control mb-3"></textarea>

            <!-- 💾 Save -->
            <button class="btn btn-save w-100">
                <i class="bi bi-check"></i> Save Game
            </button>

        </form>

    </div>

</div>

{% endblock %}
